services:
  lufeng_vpn_web:
    # Menggunakan image dari GHCR atau build lokal
    image: ghcr.io/hidessh99/sub-cf-vpn:${VERSION}
    # build:
    #   context: ..
    #   dockerfile: Dockerfile
    # container_name: ${CONTAINER_NAME}
    deploy:
      resources:
        limits:
          cpus: ${CPUS}
          memory: ${MEMORY_LIMIT}
    restart: always
    depends_on:
      - lufeng-checker
    ports:
      - ${HOST_IP}:${WEB_HTTP_PORT}:4001
    volumes:
      - ${APP_PATH}/domain.json:/usr/share/nginx/html/domain.json:ro
      - ${APP_PATH}/bug_list.json:/usr/share/nginx/html/bug_list.json:ro
      - ${APP_PATH}/proxyip.json:/usr/share/nginx/html/proxyip.json:ro
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

  lufeng-checker:
    # build:
    #   context: ../checker
    #   dockerfile: Dockerfile
    image: ghcr.io/hidessh99/sub-cf-vpn-checker:${VERSION}
    # container_name: ${CONTAINER_NAME}_checker
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512MB"
    restart: always
    expose:
      - "4002"
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

networks:
  baota_net:
    external: true
