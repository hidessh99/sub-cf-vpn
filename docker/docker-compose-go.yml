services:
  lufeng_vpn_web:
    # Menggunakan image dari GHCR atau build lokal
    image: ghcr.io/hidessh99/sub-cf-vpn:${VERSION}
    # build:
    #   context: ..
    #   dockerfile: Dockerfile
    # container_name: ${CONTAINER_NAME}
    deploy:
      resources:
        limits:
          cpus: ${CPUS}
          memory: ${MEMORY_LIMIT}
    restart: always
    depends_on:
      - lufeng-checker
    ports:
      - ${HOST_IP}:${WEB_HTTP_PORT}:4001
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

  lufeng-checker:
    # build:
    #   context: ../checker-go
    #   dockerfile: Dockerfile
    image: ghcr.io/hidessh99/sub-cf-vpn-checker-go:${VERSION}
    # container_name: ${CONTAINER_NAME}_checker
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512MB"
    restart: always
    expose:
      - "4002"
    volumes:
      - ${APP_PATH}/data:/app/data
      - ${APP_PATH}/config.json:/app/config.json:ro
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

networks:
  baota_net:
    external: true
