root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main.exe ./cmd/server"
  bin = "tmp/main.exe"
  full_bin = ""
  include_ext = ["go", "json", "toml", "yaml", "yml"]
  exclude_dir = ["assets", "tmp", "vendor", "data", ".git"]
  include_dir = []
  exclude_file = []
  delay = 1000
  stop_on_error = true
  log = "air.log"
  send_interrupt = true
  kill_delay = 500

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
